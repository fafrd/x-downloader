<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tweet to MP4 / GIF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 32px 16px; background: #0f0f0f; color: #e0e0e0; }
    h1 { font-size: clamp(1.2rem, 4vw, 1.5rem); margin-bottom: 24px; }
    label { display: block; margin-bottom: 12px; font-size: 0.9rem; }
    input { display: block; width: 100%; margin-top: 4px; padding: 10px 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 1rem; }
    .buttons { display: flex; gap: 8px; margin-top: 8px; }
    button { flex: 1; padding: 12px 16px; border: none; border-radius: 6px; color: #fff; font-size: 1rem; cursor: pointer; touch-action: manipulation; }
    button:disabled { opacity: 0.5; cursor: default; }
    #btn-mp4 { background: #1d9bf0; }
    #btn-gif { background: #7856ff; }
    .output { margin-top: 24px; display: none; }
    .output-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
    .queued  { background: #444; }
    .running { background: #1d5fa0; }
    .done    { background: #1a6634; }
    .error   { background: #7a1a1a; }
    .log { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 0.8rem; height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Tweet to MP4 / GIF</h1>
  <form id="form">
    <label>Twitter / X URL
      <input id="url" type="url" placeholder="https://twitter.com/…" required />
    </label>
    <label>Output filename (no extension)
      <input id="name" placeholder="my-video" required />
    </label>
    <div class="buttons">
      <button type="button" id="btn-mp4">&#8595; MP4</button>
      <button type="button" id="btn-gif">&#8595; GIF</button>
    </div>
  </form>
  <div id="error" style="margin-top:16px;color:#f88;font-size:0.9rem;"></div>
  <div class="output" id="output">
    <div class="output-header">
      <span id="badge" class="badge queued">queued</span>
    </div>
    <pre class="log" id="log"></pre>
  </div>

  <script>
    const btnMp4 = document.getElementById('btn-mp4');
    const btnGif = document.getElementById('btn-gif');
    const errorEl = document.getElementById('error');
    const outputEl = document.getElementById('output');
    const badgeEl = document.getElementById('badge');
    const logEl = document.getElementById('log');

    function getInputs() {
      const url  = document.getElementById('url').value.trim();
      const name = document.getElementById('name').value.trim();
      return { url, name };
    }

    function setButtons(disabled) {
      btnMp4.disabled = disabled;
      btnGif.disabled = disabled;
    }

    function startJob(format) {
      const { url, name } = getInputs();
      if (!url || !name) { errorEl.textContent = 'URL and filename are required.'; return; }
      errorEl.textContent = '';

      setButtons(true);
      logEl.textContent = '';
      badgeEl.className = 'badge queued';
      badgeEl.textContent = 'queued';
      outputEl.style.display = 'block';

      fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, name, format })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) { errorEl.textContent = data.error; setButtons(false); return; }
        watchJob(data.jobId);
      })
      .catch(err => { errorEl.textContent = err.message; setButtons(false); });
    }

    function watchJob(jobId) {
      const es = new EventSource(`/api/stream?job=${jobId}`);
      es.onmessage = (ev) => {
        const d = JSON.parse(ev.data);
        badgeEl.className = `badge ${d.status}`;
        badgeEl.textContent = d.status;
        if (d.log && d.log.length) {
          logEl.textContent = d.log.join('\n');
          logEl.scrollTop = logEl.scrollHeight;
        }

        if (d.status === 'done') {
          es.close();
          setButtons(false);
          if (d.file) {
            const a = document.createElement('a');
            a.href = d.file;
            a.download = '';
            document.body.appendChild(a);
            a.click();
            a.remove();
          }
        } else if (d.status === 'error') {
          es.close();
          setButtons(false);
        }
      };
      es.onerror = () => { es.close(); setButtons(false); };
    }

    btnMp4.addEventListener('click', () => startJob('mp4'));
    btnGif.addEventListener('click', () => startJob('gif'));
  </script>
</body>
</html>
